<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Rapide</title>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        button { background: #238636; color: white; border: none; padding: 20px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 18px; }
        #status { margin-top: 20px; color: #00ff00; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <button id="btn">🚀 LANCER LA RECHERCHE</button>
    <div id="status">> Prêt. Branchez le chargeur avant de cliquer.</div>

<script>
    document.getElementById('btn').onclick = async () => {
        const out = document.getElementById('status');
        try {
            out.innerText = "> Recherche en cours...";
            // On ne met AUCUN filtre pour forcer l'apparition de la liste
            const device = await navigator.usb.requestDevice({ filters: [] });
            out.innerText = "> Connecté à : " + device.productName;
            await device.open();
            out.innerText += "\n> Session ouverte !";
        } catch (e) {
            out.innerText = "> Erreur : " + e.message;
            if (e.message.includes("gesture")) out.innerText += "\n> Cliquez bien AU CENTRE du bouton.";
        }
    };
</script>
</body>
</html>
