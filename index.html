<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heures Routier Pro v1.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #ffffff; font-family: sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.45); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.2rem; }
        .day-box { aspect-ratio: 1/1; display: flex; items-center; justify-content: center; border-radius: 0.5rem; font-size: 0.7rem; font-weight: bold; }
        .worked { background: #ff6b35; color: white; }
        .rest { background: #1e293b; color: #475569; }
        .sunday-ferie { border: 2px solid #ef4444; }
        .tab-active { background: #ff6b35 !important; color: white !important; border-color: #ff6b35 !important; }
        .hidden { display: none; }
    </style>
</head>
<body class="pb-10">

    <header class="p-6 pb-2">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-orange-600 rounded-lg flex items-center justify-center shadow-lg text-xl">🚚</div>
            <div>
                <h1 class="text-xl font-black italic tracking-tighter uppercase leading-none">Heures <span class="text-orange-500">Routier</span></h1>
                <p class="text-[9px] text-slate-500 font-bold mt-1 uppercase tracking-widest">Dylan Petit — v1.3</p>
            </div>
        </div>
    </header>

    <div class="px-6 flex gap-2 mt-4">
        <button id="btnTabCal" onclick="switchTab('cal')" class="flex-1 bg-slate-800 py-2 rounded-full text-[10px] font-black border border-slate-700 uppercase transition-all tab-active">📅 Calendrier</button>
        <button id="btnTabTachy" onclick="switchTab('tachy')" class="flex-1 bg-slate-800 py-2 rounded-full text-[10px] font-black border border-slate-700 uppercase transition-all">📑 Tachygraphe</button>
    </div>

    <div class="px-6 mt-6 flex items-center justify-between">
        <div class="flex gap-4 items-baseline">
            <span class="text-2xl font-black text-orange-500 italic">2026</span>
            <span class="text-xl font-black text-slate-800 italic">2027</span>
        </div>
        <button onclick="document.getElementById('fileInput').click()" class="bg-indigo-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-indigo-900/20">📂 Importer</button>
    </div>

    <input type="file" id="fileInput" class="hidden" accept=".c1b,.v1b,.ddd">

    <div id="viewCalendrier" class="px-6 mt-8 space-y-8">
        <div class="glass-card p-4">
            <h3 class="text-sm font-black italic text-slate-400 uppercase mb-4">Mars <span class="text-slate-700">2026</span></h3>
            <div class="grid grid-cols-7 gap-2 text-center text-[8px] text-slate-600 font-bold mb-2">
                <span>LU</span><span>MA</span><span>ME</span><span>JE</span><span>VE</span><span>SA</span><span class="text-red-500">DI</span>
            </div>
            <div id="gridMars" class="grid grid-cols-7 gap-2">
                </div>
        </div>
    </div>

    <div id="viewTachy" class="px-6 mt-8 hidden">
        <h3 class="text-sm font-black italic text-slate-400 uppercase mb-4 italic">Détails <span class="text-slate-700">Mars</span></h3>
        <div class="glass-card overflow-hidden">
            <table class="w-full text-left text-[11px]">
                <thead class="bg-slate-800/50 text-slate-500 font-bold uppercase">
                    <tr>
                        <th class="p-4 border-b border-slate-700">Date</th>
                        <th class="p-4 border-b border-slate-700 text-orange-500">Heures Totales</th>
                        <th class="p-4 border-b border-slate-700 text-blue-400">Nuit (21h-6h)</th>
                    </tr>
                </thead>
                <tbody id="tachyTableBody" class="font-mono">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Switch entre les vues
        function switchTab(tab) {
            const vCal = document.getElementById('viewCalendrier');
            const vTachy = document.getElementById('viewTachy');
            const btnCal = document.getElementById('btnTabCal');
            const btnTachy = document.getElementById('btnTabTachy');

            if (tab === 'cal') {
                vCal.classList.remove('hidden');
                vTachy.classList.add('hidden');
                btnCal.classList.add('tab-active');
                btnTachy.classList.remove('tab-active');
            } else {
                vCal.classList.add('hidden');
                vTachy.classList.remove('hidden');
                btnCal.classList.remove('tab-active');
                btnTachy.classList.add('tab-active');
            }
        }

        // Génération du calendrier de Mars pour l'exemple
        function buildCalendar() {
            const grid = document.getElementById('gridMars');
            const table = document.getElementById('tachyTableBody');
            
            // On simule 31 jours
            for (let d = 1; d <= 31; d++) {
                // Design Calendrier
                const day = document.createElement('div');
                const isWorked = d % 7 !== 0 && d % 7 !== 6; // Simule repos week-end
                const isSunday = (d % 7 === 1); // Pour le test DI = 1, 8, 15...
                
                day.className = `day-box ${isWorked ? 'worked' : 'rest'} ${isSunday ? 'sunday-ferie' : ''}`;
                day.innerText = d;
                grid.appendChild(day);

                // Design Tableau Tachygraphe
                if (isWorked) {
                    const row = document.createElement('tr');
                    row.className = "border-b border-slate-800/50";
                    row.innerHTML = `
                        <td class="p-4 text-slate-400">${d < 10 ? '0'+d : d}/03</td>
                        <td class="p-4 font-bold">09h45</td>
                        <td class="p-4 text-blue-400">07h20</td>
                    `;
                    table.appendChild(row);
                }
            }
        }

        window.onload = buildCalendar;
    </script>
</body>
</html>
