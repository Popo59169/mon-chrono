<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Chrono</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #ffffff; font-family: sans-serif; margin: 0; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; }
        .day-box { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; border-radius: 0.75rem; font-weight: 900; cursor: pointer; }
        .worked { background: linear-gradient(135deg, #ff6b35 0%, #d44d1a 100%); color: white; }
        .rest { background: #1e293b; color: #475569; }
        .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: 280px; background: #0f172a; z-index: 1000; transform: translateX(-100%); transition: 0.3s; border-right: 1px solid #1e293b; }
        .sidebar.open { transform: translateX(0); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 999; display: none; }
        .tab-active { background: #ff6b35 !important; color: white !important; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <div id="sidebar" class="sidebar p-6">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-orange-500 font-black italic uppercase text-xl">Mon Chrono</h2>
            <button onclick="toggleSidebar()" class="text-2xl">✕</button>
        </div>
        
        <div class="mb-8 p-4 bg-slate-800/50 rounded-2xl border border-white/5">
            <p id="sideName" class="text-sm font-black uppercase italic">Nom Conducteur</p>
            <p class="text-[10px] text-orange-500 font-bold uppercase tracking-widest">Chauffeur Routier</p>
        </div>

        <nav class="flex flex-col gap-2">
            <button onclick="navTo('dashboard')" class="w-full text-left p-4 hover:bg-slate-800 rounded-xl font-bold">📊 Tableau de bord</button>
            <button onclick="navTo('activities')" class="w-full text-left p-4 hover:bg-slate-800 rounded-xl font-bold">🚛 Activités</button>
            <button onclick="navTo('infractions')" class="w-full text-left p-4 hover:bg-slate-800 rounded-xl font-bold">⚠️ Infractions</button>
            <hr class="border-slate-800 my-2">
            <button onclick="navTo('import')" class="w-full text-left p-4 bg-orange-500/10 text-orange-500 rounded-xl font-black italic">📥 IMPORTER CARTE</button>
        </nav>
    </div>

    <header class="p-6 flex items-center gap-4">
        <button onclick="toggleSidebar()" class="w-12 h-12 bg-orange-600 rounded-xl flex items-center justify-center text-2xl shadow-lg">🚛</button>
        <div>
            <h1 class="text-xl font-black italic uppercase leading-none text-white">Mon <span class="text-orange-500">Chrono</span></h1>
            <p id="headName" class="text-[10px] text-slate-500 font-bold uppercase mt-1 italic">Chauffeur Routier</p>
        </div>
    </header>

    <main class="px-6">
        <div id="view-dashboard" class="page-view">
            <div class="flex gap-2 mb-6">
                <button id="btnCal" onclick="setTab('cal')" class="flex-1 py-3 rounded-full bg-slate-800 text-[10px] font-black uppercase tab-active">Calendrier</button>
                <button id="btnTachy" onclick="setTab('tachy')" class="flex-1 py-3 rounded-full bg-slate-800 text-[10px] font-black uppercase">Tachygraphe</button>
            </div>

            <div id="sec-cal" class="glass-card p-4">
                <h3 class="text-xs font-black uppercase text-slate-500 mb-4 italic">Mars 2026</h3>
                <div id="grid" class="grid grid-cols-7 gap-2 text-center"></div>
            </div>

            <div id="sec-tachy" class="glass-card p-4 hidden">
                <table class="w-full text-[11px]">
                    <thead class="text-slate-500 uppercase font-bold border-b border-slate-700">
                        <tr><th class="py-2 text-left">Date</th><th class="py-2">Service</th><th class="py-2 text-right text-blue-400">Nuit</th></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="view-import" class="page-view hidden">
            <h2 class="text-xl font-black uppercase italic mb-6">Importation</h2>
            <button onclick="simulRead()" class="w-full py-6 bg-indigo-600 rounded-3xl font-black uppercase mb-4 shadow-xl">💳 Lire Carte Conducteur</button>
            <p id="status" class="text-center text-orange-500 font-bold uppercase text-[10px] hidden animate-pulse">Lecture de la puce...</p>
        </div>

        <div id="view-activities" class="page-view hidden px-4 py-10 glass-card text-center italic text-slate-500">Flux d'activités bientôt disponible...</div>
        <div id="view-infractions" class="page-view hidden px-4 py-10 glass-card text-center font-black text-emerald-500 italic">✅ AUCUNE INFRACTION DÉTECTÉE</div>
    </main>

    <script>
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            const isOpen = sb.classList.contains('open');
            sb.classList.toggle('open');
            ov.style.display = isOpen ? 'none' : 'block';
        }

        function navTo(id) {
            document.querySelectorAll('.page-view').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + id).classList.remove('hidden');
            toggleSidebar();
        }

        function setTab(type) {
            document.getElementById('sec-cal').classList.toggle('hidden', type !== 'cal');
            document.getElementById('sec-tachy').classList.toggle('hidden', type !== 'tachy');
            document.getElementById('btnCal').classList.toggle('tab-active', type === 'cal');
            document.getElementById('btnTachy').classList.toggle('tab-active', type === 'tachy');
        }

        function simulRead() {
            const s = document.getElementById('status');
            s.classList.remove('hidden');
            setTimeout(() => {
                const name = "DYLAN PETIT";
                document.getElementById('sideName').innerText = name;
                document.getElementById('headName').innerText = name + " — CHAUFFEUR ROUTIER";
                s.innerText = "✅ CARTE SYNCHRONISÉE";
                setTimeout(() => navTo('dashboard'), 1000);
            }, 2000);
        }

        function init() {
            const grid = document.getElementById('grid');
            const table = document.getElementById('tableBody');
            grid.innerHTML = ""; table.innerHTML = "";

            for(let d=1; d<=31; d++) {
                const isOff = (d % 7 == 0 || d % 7 == 6);
                const day = document.createElement('div');
                day.className = `day-box ${isOff ? 'rest' : 'worked'}`;
                day.innerText = d;
                grid.appendChild(day);

                if(!isOff) {
                    const tr = document.createElement('tr');
                    tr.className = "border-b border-white/5";
                    tr.innerHTML = `<td class="py-3 text-slate-400 font-bold">${d}/03</td><td class="py-3 text-center font-black">10h30</td><td class="py-3 text-right text-blue-400 font-black">07h20</td>`;
                    table.appendChild(tr);
                }
            }
        }
        window.onload = init;
    </script>
</body>
</html>
