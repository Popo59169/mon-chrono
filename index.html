<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heures Routier Pro v1.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #ffffff; font-family: sans-serif; overflow-x: hidden; }
        .glass-card { background: rgba(30, 41, 59, 0.45); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem; }
        .day-box { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; border-radius: 0.75rem; font-size: 0.8rem; font-weight: 900; }
        .worked { background: linear-gradient(135deg, #ff6b35 0%, #d44d1a 100%); color: white; }
        .rest { background: #1e293b; color: #475569; }
        .sunday-ferie { border: 2px solid #ef4444; }
        .tab-active { background: #ff6b35 !important; color: white !important; border-color: #ff6b35 !important; }
        .sidebar { transform: translateX(-100%); transition: transform 0.3s ease-in-out; }
        .sidebar.open { transform: translateX(0); }
        .activity-bar { height: 20px; border-radius: 4px; overflow: hidden; display: flex; }
        .act-conduite { background: #b91c1c; } /* Rouge foncé */
        .act-repos { background: #15803d; }    /* Vert */
        .act-travail { background: #b45309; }  /* Orange/Marron */
        .act-pause { background: #4338ca; }    /* Bleu/Violet */
        .hidden { display: none; }
    </style>
</head>
<body class="pb-10">

    <div id="sidebar" class="sidebar fixed inset-y-0 left-0 w-64 bg-slate-900 z-[100] p-6 shadow-2xl border-r border-slate-800">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-orange-500 font-black italic uppercase">Menu</h2>
            <button onclick="toggleSidebar()" class="text-slate-500 text-xl">✕</button>
        </div>
        <nav class="space-y-4">
            <button onclick="navTo('dashboard')" class="w-full text-left p-4 rounded-xl hover:bg-slate-800 flex items-center gap-3 font-bold text-sm">📊 Tableau de bord</button>
            <button onclick="navTo('activities')" class="w-full text-left p-4 rounded-xl hover:bg-slate-800 flex items-center gap-3 font-bold text-sm">🚛 Activités</button>
            <button onclick="navTo('infractions')" class="w-full text-left p-4 rounded-xl hover:bg-slate-800 flex items-center gap-3 font-bold text-sm text-red-400">⚠️ Infractions</button>
        </nav>
    </div>
    <div id="overlay" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[90]"></div>

    <header class="p-6 pb-2 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div onclick="toggleSidebar()" class="w-10 h-10 bg-orange-600 rounded-lg flex items-center justify-center shadow-lg text-xl shadow-orange-900/20 cursor-pointer active:scale-90 transition">🚛</div>
            <div>
                <h1 class="text-xl font-black italic tracking-tighter uppercase leading-none">Heures <span class="text-orange-500">Routier</span></h1>
                <p class="text-[9px] text-slate-500 font-bold mt-1 uppercase tracking-widest">Dylan Petit — Expert</p>
            </div>
        </div>
    </header>

    <main id="view-dashboard" class="page-view">
        <div class="px-6 flex gap-2 mt-4">
            <button id="btnTabCal" onclick="switchTab('cal')" class="flex-1 bg-slate-800 py-3 rounded-full text-[10px] font-black border border-slate-700 uppercase tab-active">📅 Calendrier</button>
            <button id="btnTabTachy" onclick="switchTab('tachy')" class="flex-1 bg-slate-800 py-3 rounded-full text-[10px] font-black border border-slate-700 uppercase">📑 Tachygraphe</button>
        </div>
        <div id="calContainer" class="px-6 mt-8">
            <div class="glass-card p-5">
                <h3 class="text-sm font-black italic text-slate-400 uppercase mb-4 tracking-tight">Mars <span class="displayYear text-slate-700 text-xs">2026</span></h3>
                <div id="gridMars" class="grid grid-cols-7 gap-3"></div>
            </div>
        </div>
    </main>

    <main id="view-activities" class="page-view hidden px-6 mt-6">
        <h2 class="text-xl font-black italic uppercase mb-6">Chronologie <span class="text-slate-600 text-sm">du jour</span></h2>
        
        <div class="glass-card p-6 border-t-4 border-orange-500">
            <p class="text-[10px] text-slate-500 font-black mb-4 uppercase italic">Jeudi 12 Mars 2026</p>
            
            <div class="activity-bar mb-6">
                <div class="act-repos" style="width: 25%"></div>
                <div class="act-conduite" style="width: 15%"></div>
                <div class="act-pause" style="width: 5%"></div>
                <div class="act-conduite" style="width: 20%"></div>
                <div class="act-travail" style="width: 10%"></div>
                <div class="act-repos" style="width: 25%"></div>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center text-xs">
                    <div class="flex items-center gap-3">
                        <div class="w-1 h-8 act-repos rounded-full"></div>
                        <div><p class="font-bold">Repos</p><p class="text-[10px] text-slate-500">00:00 → 06:00</p></div>
                    </div>
                    <p class="font-black">6h00</p>
                </div>
                <div class="flex justify-between items-center text-xs">
                    <div class="flex items-center gap-3">
                        <div class="w-1 h-8 act-conduite rounded-full"></div>
                        <div><p class="font-bold text-red-500">Conduite</p><p class="text-[10px] text-slate-500">06:00 → 09:30</p></div>
                    </div>
                    <p class="font-black">3h30</p>
                </div>
            </div>
        </div>
    </main>

    <main id="view-infractions" class="page-view hidden px-6 mt-6 text-center">
        <div class="glass-card p-10">
            <div class="text-4xl mb-4">✅</div>
            <h3 class="text-lg font-black uppercase">Aucune infraction</h3>
            <p class="text-xs text-slate-500 mt-2">Votre conduite respecte les temps de repos réglementaires sur les 28 derniers jours.</p>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function navTo(viewId) {
            document.querySelectorAll('.page-view').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + viewId).classList.remove('hidden');
            toggleSidebar();
        }

        // Réutilisation de la fonction buildApp pour le calendrier
        function buildApp() {
            const grid = document.getElementById('gridMars');
            grid.innerHTML = "";
            for (let d = 1; d <= 31; d++) {
                const day = document.createElement('div');
                const isWorked = d % 7 !== 0 && d % 7 !== 6;
                day.className = `day-box ${isWorked ? 'worked' : 'rest'}`;
                day.innerText = d;
                grid.appendChild(day);
            }
        }
        window.onload = buildApp;
    </script>
</body>
</html>
