<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Chrono — Gestion Routier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #ffffff; font-family: sans-serif; overflow-x: hidden; }
        .glass-card { background: rgba(30, 41, 59, 0.45); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem; }
        .day-box { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; border-radius: 0.75rem; font-size: 0.8rem; font-weight: 900; transition: all 0.2s; cursor: pointer; }
        .worked { background: linear-gradient(135deg, #ff6b35 0%, #d44d1a 100%); color: white; }
        .rest { background: #1e293b; color: #475569; }
        .sunday-ferie { border: 2px solid #ef4444; }
        .sidebar { transform: translateX(-100%); transition: transform 0.3s ease-in-out; position: fixed; inset: 0; right: auto; width: 260px; height: 100%; z-index: 100; background: #0f172a; border-right: 1px solid #1e293b; }
        .sidebar.open { transform: translateX(0); }
        .tab-active { background: #ff6b35 !important; color: white !important; border-color: #ff6b35 !important; }
        .hidden { display: none; }
    </style>
</head>
<body class="pb-10">

    <div id="sidebar" class="sidebar p-6">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-orange-500 font-black italic uppercase">Mon Chrono</h2>
            <button onclick="toggleSidebar()" class="text-slate-500 text-xl">✕</button>
        </div>
        <div class="px-4 py-3 mb-6 bg-slate-800/40 rounded-2xl border border-white/5">
            <p id="cardNameSidebar" class="text-sm font-black text-white uppercase italic">Nom Conducteur</p>
            <p class="text-[9px] text-orange-500 font-bold uppercase tracking-widest mt-1">Chauffeur Routier</p>
        </div>
        <nav class="space-y-2">
            <button onclick="navTo('dashboard')" class="w-full text-left p-4 rounded-xl hover:bg-slate-800 flex items-center gap-3 font-bold text-sm text-white">📊 Tableau de bord</button>
            <button onclick="navTo('activities')" class="w-full text-left p-4 rounded-xl hover:bg-slate-800 flex items-center gap-3 font-bold text-sm text-white">🚛 Activités</button>
            <button onclick="navTo('infractions')" class="w-full text-left p-4 rounded-xl hover:bg-slate-800 flex items-center gap-3 font-bold text-sm text-white">⚠️ Infractions</button>
            <div class="h-[1px] bg-slate-800 my-4"></div>
            <button onclick="navTo('import')" class="w-full text-left p-4 rounded-xl bg-orange-500/10 border border-orange-500/20 flex items-center gap-3 font-bold text-sm text-orange-500 font-black">📥 IMPORTER</button>
        </nav>
    </div>
    <div id="overlay" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[90]"></div>

    <header class="p-6 pb-2 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div onclick="toggleSidebar()" class="w-10 h-10 bg-orange-600 rounded-lg flex items-center justify-center shadow-lg text-xl cursor-pointer">🚛</div>
            <div>
                <h1 class="text-xl font-black italic tracking-tighter uppercase leading-none">Mon <span class="text-orange-500">Chrono</span></h1>
                <p id="headerName" class="text-[9px] text-slate-500 font-bold mt-1 uppercase tracking-widest italic leading-none">Chauffeur Routier</p>
            </div>
        </div>
    </header>

    <main id="view-dashboard" class="page-view px-6 mt-4">
        <div class="flex gap-2">
            <button id="btnTabCal" onclick="switchTab('cal')" class="flex-1 bg-slate-800 py-3 rounded-full text-[10px] font-black border border-slate-700 uppercase tab-active">📅 Calendrier</button>
            <button id="btnTabTachy" onclick="switchTab('tachy')" class="flex-1 bg-slate-800 py-3 rounded-full text-[10px] font-black border border-slate-700 uppercase">📑 Tachygraphe</button>
        </div>

        <div id="container-cal" class="mt-8">
            <div class="glass-card p-5">
                <h3 class="text-sm font-black italic text-slate-400 uppercase mb-4 tracking-tight">Mars 2026</h3>
                <div class="grid grid-cols-7 gap-3 text-[9px] text-slate-600 font-black mb-3 uppercase text-center">
                    <span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span><span class="text-red-500">D</span>
                </div>
                <div id="gridMars" class="grid grid-cols-7 gap-3"></div>
            </div>
        </div>

        <div id="container-tachy" class="mt-8 hidden">
            <div class="glass-card overflow-hidden">
                <table class="w-full text-left text-[11px]">
                    <thead class="bg-slate-800/50 text-slate-500 font-bold uppercase">
                        <tr><th class="p-4 border-b border-slate-700">Date</th><th class="p-4 border-b border-slate-700 text-orange-500">Service</th><th class="p-4 border-b border-slate-700 text-blue-400 text-right">Nuit</th></tr>
                    </thead>
                    <tbody id="tachyTableBody"></tbody>
                    <tfoot class="bg-slate-900/80 font-black">
                        <tr class="text-white border-t-2 border-slate-700">
                            <td class="p-4 uppercase text-slate-500">Total</td>
                            <td id="totalService" class="p-4 text-orange-500 text-sm">0h00</td>
                            <td id="totalNuit" class="p-4 text-blue-400 text-sm text-right">0h00</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </main>

    <div id="dayModal" class="hidden fixed inset-0 z-[110] flex items-end sm:items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="glass-card w-full max-w-sm p-6 relative border-t-4 border-orange-500">
            <h3 id="modalDate" class="text-2xl font-black italic text-white uppercase mb-4">DATE</h3>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-indigo-500/10 p-4 rounded-2xl border border-indigo-500/20">
                    <p class="text-[9px] text-indigo-400 font-black uppercase">Service / Nuit</p>
                    <p class="text-xl font-black">10h30 / 07h20</p>
                </div>
                <div class="bg-emerald-500/10 p-4 rounded-2xl border border-emerald-500/20 text-right">
                    <p class="text-[9px] text-emerald-400 font-black uppercase">Frais</p>
                    <p id="modalFrais" class="text-xl font-black">22.42€</p>
                </div>
            </div>
            <button onclick="closeModal()" class="w-full py-4 bg-orange-600 rounded-2xl font-black uppercase text-xs">Fermer</button>
        </div>
    </div>

    <main id="view-import" class="page-view hidden px-6 mt-6">
        <h2 class="text-xl font-black italic uppercase mb-6 text-orange-500">📥 Importation</h2>
        <button onclick="startCardRead()" class="w-full bg-indigo-600 py-6 rounded-3xl font-black uppercase text-xs mb-4">💳 Lire Carte USB</button>
        <button class="w-full bg-slate-800 py-6 rounded-3xl font-black uppercase text-xs">📂 Charger Fichier</button>
        <div id="importStatus" class="hidden mt-6 text-center animate-pulse text-orange-500 font-black uppercase text-[10px]">Lecture...</div>
    </main>

    <main id="view-activities" class="page-view hidden px-6 mt-6"><div class="glass-card p-6">Chronologie active...</div></main>
    <main id="view-infractions" class="page-view hidden px-6 mt-6"><div class="glass-card p-6 text-center font-black">✅ AUCUNE INFRACTION</div></main>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle
