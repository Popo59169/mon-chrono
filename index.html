    <main class="w-full max-w-lg p-4 flex flex-col items-center">
        
        <div class="w-full flex gap-3 mb-8">
            <button id="btnConnect" class="flex-1 bg-blue-600 py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2 text-sm">
                <span>📡 LECTEUR USB</span>
            </button>
            
            <input type="file" id="fileInput" class="hidden" accept=".c1b,.v1b,.ddd">
            <button id="btnImport" class="flex-1 bg-purple-600 py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2 text-sm">
                <span>📂 IMPORTER FICHIER</span>
            </button>
        </div>

        <div class="w-full grid grid-cols-2 gap-4 mb-8">
            <div class="bg-slate-800/60 p-4 rounded-2xl border border-orange-600/20">
                <label class="text-[10px] text-slate-500 uppercase font-bold">Jours travaillés</label>
                <p id="daysWorked" class="text-3xl font-black text-orange-400">--</p>
            </div>
            <div class="bg-slate-800/60 p-4 rounded-2xl border border-blue-600/20">
                <label class="text-[10px] text-slate-500 uppercase font-bold">Heures de nuit</label>
                <p id="nightHours" class="text-3xl font-black text-blue-400">--h--</p>
            </div>
        </div>

        <div class="w-full bg-slate-800 rounded-3xl p-6 shadow-xl border border-slate-700">
            <div class="flex justify-between items-center mb-4">
                <h2 class="italic font-bold">HISTORIQUE DES DONNÉES</h2>
                <span id="sourceLabel" class="text-[10px] bg-slate-700 px-2 py-1 rounded text-slate-400 uppercase">Aucune source</span>
            </div>
            <div id="trajetsList" class="space-y-3 font-mono text-xs">
                <p class="text-center text-slate-600 py-10">En attente de données...</p>
            </div>
        </div>
    </main>

    <script>
        const btnConnect = document.getElementById('btnConnect');
        const btnImport = document.getElementById('btnImport');
        const fileInput = document.getElementById('fileInput');
        const sourceLabel = document.getElementById('sourceLabel');
        const trajetsList = document.getElementById('trajetsList');

        // --- FONCTION DE TRAITEMENT DES DONNÉES ---
        function processData(sourceName) {
            sourceLabel.innerText = sourceName;
            sourceLabel.classList.replace('bg-slate-700', 'bg-green-900');
            sourceLabel.classList.replace('text-slate-400', 'text-green-400');

            // Simulation du remplissage (Ici on placera le décodeur C1B)
            document.getElementById('daysWorked').innerText = "89";
            document.getElementById('nightHours').innerText = "859h00";
            
            trajetsList.innerHTML = `
                <div class="grid grid-cols-4 text-orange-400 font-bold border-b border-slate-700 pb-1">
                    <span>30/12</span><span>9h41</span><span class="text-blue-400">9h00</span><span class="text-green-400">58k</span>
                </div>
                <div class="grid grid-cols-4 text-white">
                    <span>29/12</span><span>9h10</span><span class="text-blue-400">8h54</span><span class="text-green-400">59k</span>
                </div>
            `;
        }

        // --- OPTION 1 : LECTEUR USB ACS ---
        btnConnect.addEventListener('click', async () => {
            try {
                const device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x072f }] });
                await device.open();
                // ... (logique de lecture APDU déjà vue)
                processData("LECTEUR ACS CONNECTÉ");
            } catch (err) {
                alert("Erreur USB : " + err.message);
            }
        });

        // --- OPTION 2 : IMPORT DE FICHIER ---
        btnImport.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const binaryData = event.target.result; // Voici tes octets bruts !
                    console.log("Fichier chargé, taille :", binaryData.byteLength);
                    processData("FICHIER : " + file.name);
                };
                reader.readAsArrayBuffer(file);
            }
        });
    </script>
