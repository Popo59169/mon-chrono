<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Lecteur Direct</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; text-align: center; padding: 20px; }
        .btn-direct { background: #00ff88; color: black; padding: 20px; border-radius: 50px; font-weight: bold; cursor: pointer; border: none; font-size: 1.1em; }
        #status { margin-top: 20px; padding: 15px; border-radius: 10px; background: #161b22; }
    </style>
</head>
<body>

    <h1>Tachy Dylan</h1>
    <p>Test de connexion directe USB</p>

    <button class="btn-direct" id="connect-usb">🔌 CONNECTER LE LECTEUR</button>

    <div id="status">Branche ton lecteur et clique sur le bouton.</div>

    <script>
        document.getElementById('connect-usb').addEventListener('click', async () => {
            const statusDiv = document.getElementById('status');
            
            if (!navigator.usb) {
                statusDiv.innerHTML = "❌ Ton navigateur ne supporte pas la connexion USB directe. (Utilise Chrome ou Samsung Internet)";
                return;
            }

            try {
                // On demande au navigateur de chercher n'importe quel appareil USB branché
                const device = await navigator.usb.requestDevice({ filters: [] });
                
                statusDiv.innerHTML = `
                    <b style="color:#00ff88">✅ LECTEUR DÉTECTÉ !</b><br>
                    Modèle : ${device.productName}<br>
                    Fabricant : ${device.manufacturerName}<br><br>
                    <i>C'est bon signe, on peut passer au codage de la lecture !</i>
                `;
                console.log(device);
            } catch (error) {
                statusDiv.innerHTML = "❌ Connexion annulée ou aucun lecteur trouvé.";
            }
        });
    </script>
</body>
</html>
