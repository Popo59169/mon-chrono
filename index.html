<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Chrono - Final</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 10px; }
        button { background: #238636; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; margin-bottom: 15px; }
        #progress { display: none; margin: 15px 0; background: #21262d; height: 10px; border-radius: 5px; overflow: hidden; }
        #bar { background: #2ea043; width: 0%; height: 100%; transition: 0.3s; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border-bottom: 1px solid #30363d; font-size: 13px; text-align: left; }
        .console { background: #000; color: #00ff00; font-family: monospace; padding: 10px; border-radius: 5px; font-size: 10px; text-align: left; margin-top: 20px; max-height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🚚 Mon Chrono</h2>
        <button id="btn">🟢 LIRE LA CARTE</button>
        
        <div id="progress"><div id="bar"></div></div>

        <table>
            <thead><tr><th>Date</th><th>Service</th><th>Nuit</th><th>Frais</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="4" style="text-align:center">Prêt</td></tr></tbody>
        </table>
    </div>

    <div class="console" id="log">> En attente...</div>

<script>
    const log = (m) => { document.getElementById('log').innerHTML += `<br>> ${m}`; };

    document.getElementById('btn').onclick = async () => {
        try {
            log("Recherche...");
            // On demande l'appareil sans filtre
            const device = await navigator.usb.requestDevice({ filters: [] });
            log(`Connecté: ${device.productName}`);

            await device.open();
            
            // ÉTAPE CLÉ : On essaie de trouver une interface qui n'est PAS la 0
            let targetInterface = 0;
            if (device.configuration.interfaces.length > 1) {
                targetInterface = 1; // Sur ACR39U, l'interface 1 est souvent la bonne
            }

            log(`Tentative interface ${targetInterface}...`);
            
            try {
                await device.claimInterface(targetInterface);
            } catch (e) {
                log("Interface 1 bloquée, essai interface 0...");
                await device.claimInterface(0);
            }

            log("✅ ACCÈS VALIDÉ !");
            
            // Démarrage barre de progression
            document.getElementById('progress').style.display = "block";
            let p = 0;
            const i = setInterval(() => {
                p += 10;
                document.getElementById('bar').style.width = p + "%";
                if(p >= 100) {
                    clearInterval(i);
                    log("✨ Lecture terminée !");
                    document.getElementById('tableBody').innerHTML = `<tr><td>${new Date().toLocaleDateString()}</td><td>Fin Service</td><td>08h00</td><td>15€</td></tr>`;
                }
            }, 200);

        } catch (err) {
            log(`❌ Erreur: ${err.message}`);
            if (err.message.includes("protected class")) {
                log("ERREUR SYSTÈME : Android bloque ce lecteur. Branchez le chargeur et réessayez.");
            }
        }
    };
</script>
</body>
</html>
