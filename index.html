<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heures Routier Pro v1.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #ffffff; font-family: sans-serif; overflow-x: hidden; }
        .glass-card { background: rgba(30, 41, 59, 0.45); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem; }
        .day-box { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; border-radius: 0.75rem; font-size: 0.8rem; font-weight: 900; transition: all 0.2s; }
        .worked { background: linear-gradient(135deg, #ff6b35 0%, #d44d1a 100%); color: white; box-shadow: 0 4px 10px rgba(212, 77, 26, 0.2); }
        .rest { background: #1e293b; color: #475569; }
        .sunday-ferie { border: 2px solid #ef4444; }
        .tab-active { background: #ff6b35 !important; color: white !important; border-color: #ff6b35 !important; }
        .year-btn { cursor: pointer; transition: all 0.3s ease; }
        .btn-orange { background: linear-gradient(135deg, #ff6b35 0%, #d44d1a 100%); }
        .hidden { display: none; }
    </style>
</head>
<body class="pb-10">

    <header class="p-6 pb-2 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-orange-600 rounded-lg flex items-center justify-center shadow-lg text-xl shadow-orange-900/20">🚛</div>
            <div>
                <h1 class="text-xl font-black italic tracking-tighter uppercase leading-none">Heures <span class="text-orange-500">Routier</span></h1>
                <p class="text-[9px] text-slate-500 font-bold mt-1 uppercase tracking-widest">Dylan Petit — Nuit Pro</p>
            </div>
        </div>
        <button id="btnConnect" class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700 active:scale-90 transition">📡</button>
    </header>

    <div class="px-6 flex gap-2 mt-4">
        <button id="btnTabCal" onclick="switchTab('cal')" class="flex-1 bg-slate-800 py-3 rounded-full text-[10px] font-black border border-slate-700 uppercase transition-all tab-active">📅 Calendrier</button>
        <button id="btnTabTachy" onclick="switchTab('tachy')" class="flex-1 bg-slate-800 py-3 rounded-full text-[10px] font-black border border-slate-700 uppercase transition-all">📑 Tachygraphe</button>
    </div>

    <div class="px-6 mt-6 flex items-center justify-between">
        <div id="yearSelector" class="flex gap-4 items-baseline">
            <button onclick="changeYear(2025)" class="year-btn text-xl font-black text-slate-800 italic">2025</button>
            <button onclick="changeYear(2026)" class="year-btn text-2xl font-black text-orange-500 italic">2026</button>
            <button onclick="changeYear(2027)" class="year-btn text-xl font-black text-slate-800 italic">2027</button>
        </div>
        <button onclick="document.getElementById('fileInput').click()" class="bg-indigo-600 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-indigo-900/20 active:scale-95 transition">📂 Importer</button>
    </div>

    <input type="file" id="fileInput" class="hidden" accept=".c1b,.v1b,.ddd">

    <div id="viewCalendrier" class="px-6 mt-8">
        <div class="glass-card p-5">
            <h3 class="text-sm font-black italic text-slate-400 uppercase mb-4 tracking-tight">Mars <span id="displayYear" class="text-slate-700 text-xs">2026</span></h3>
            <div class="grid grid-cols-7 gap-3 text-center text-[9px] text-slate-600 font-black mb-3 uppercase">
                <span>Lun</span><span>Mar</span><span>Mer</span><span>Jeu</span><span>Ven</span><span>Sam</span><span class="text-red-500">Dim</span>
            </div>
            <div id="gridMars" class="grid grid-cols-7 gap-3"></div>
        </div>
    </div>

    <div id="viewTachy" class="px-6 mt-8 hidden">
        <h3 class="text-sm font-black italic text-slate-400 uppercase mb-4">Historique <span id="displayYearTachy">2026</span></h3>
        <div class="glass-card overflow-hidden">
            <table class="w-full text-left text-[11px]">
                <thead class="bg-slate-800/50 text-slate-500 font-bold uppercase">
                    <tr>
                        <th class="p-4 border-b border-slate-700">Date</th>
                        <th class="p-4 border-b border-slate-700 text-orange-500">Service Total</th>
                        <th class="p-4 border-b border-slate-700 text-blue-400">Nuit</th>
                    </tr>
                </thead>
                <tbody id="tachyTableBody" class="font-mono"></tbody>
                <tfoot class="bg-slate-900/80 font-black">
                    <tr class="text-white border-t-2 border-slate-700">
                        <td class="p-4 uppercase italic text-slate-500">Total Mois</td>
                        <td id="totalHeuresMois" class="p-4 text-orange-500 text-sm">0h00</td>
                        <td id="totalNuitMois" class="p-4 text-blue-400 text-sm">0h00</td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <div id="dayModal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="glass-card w-full max-w-sm p-6 relative animate-in slide-in-from-bottom duration-300 border-t-4 border-t-orange-500 shadow-2xl">
            <div class="w-12 h-1 bg-slate-700 rounded-full mx-auto mb-6"></div>
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h3 id="modalDate" class="text-3xl font-black italic text-white uppercase tracking-tighter">12 MARS</h3>
                    <div id="badgeFerie" class="hidden bg-red-600/20 text-red-500 text-[9px] font-black px-2 py-1 rounded mt-1 uppercase w-fit">Dimanche / Férié</div>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-slate-500 font-bold uppercase">Temps de Service</p>
                    <p id="modalService" class="text-2xl font-black text-orange-500">10h30</p>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-indigo-500/10 p-4 rounded-2xl border border-indigo-500/20">
                    <p class="text-[9px] text-indigo-400 font-black uppercase mb-1">Heures de Nuit</p>
                    <p id="modalNight" class="text-2xl font-black text-white">07h20</p>
                </div>
                <div class="bg-emerald-500/10 p-4 rounded-2xl border border-emerald-500/20 text-right">
                    <p class="text-[9px] text-emerald-400 font-black uppercase mb-1">Frais du jour</p>
                    <p id="modalFrais" class="text-2xl font-black text-white">22.42€</p>
                </div>
            </div>
            <div class="mt-4 bg-slate-900/80 rounded-2xl p-4 border border-white/5">
                <div class="flex justify-between items-center mb-2 text-[10px]">
                    <span class="text-slate-500 font-bold uppercase">Travail + Coupures</span>
                    <span id="modalWork" class="font-mono font-bold text-white text-sm">09h15 / 01h15</span>
                </div>
                <div class="w-full bg-slate-800 h-1.5 rounded-full flex">
                    <div id="barWork" class="bg-orange-500 h-full rounded-full" style="width: 85%"></div>
                </div>
            </div>
            <button onclick="closeModal()" class="btn-orange w-full mt-6 py-4 rounded-2xl text-xs font-black uppercase tracking-widest active:scale-95 transition">Fermer</button>
        </div>
    </div>

    <script>
        let currentYear = 2026;
        const TARIFS = { PRIME_22H: 35.00, REPAS_NUIT: 8.50 };

        function switchTab(tab) {
            document.getElementById('viewCalendrier').classList.toggle('hidden', tab !== 'cal');
            document.getElementById('viewTachy').classList.toggle('hidden', tab !== 'tachy');
            document.getElementById('btnTabCal').classList.toggle('tab-active', tab === 'cal');
            document.getElementById('btnTabTachy').classList.toggle('tab-active', tab === 'tachy');
        }

        function changeYear(year) {
            currentYear = year;
            const btns = document.querySelectorAll('.year-btn');
            btns.forEach(b => {
                if(parseInt(b.innerText) === year) {
                    b.classList.replace('text-xl', 'text-2xl');
                    b.classList.replace('text-slate-800', 'text-orange-500');
                } else {
                    b.classList.replace('text-2xl', 'text-xl');
                    b.classList.replace('text-orange-500', 'text-slate-800');
                }
            });
            buildApp();
        }

        function openDayDetails(dayNumber, isWorked, isSunday) {
            if(!isWorked) return;
            document.getElementById('modalDate').innerText = dayNumber + " MARS " + currentYear;
            document.getElementById('badgeFerie').classList.toggle('hidden', !isSunday);
            let frais = isSunday ? (TARIFS.REPAS_NUIT + TARIFS.PRIME_22H) : TARIFS.REPAS_NUIT;
            document.getElementById('modalFrais').innerText = frais.toFixed(2) + "€";
            document.getElementById('dayModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('dayModal').classList.add('hidden'); }

        function buildApp() {
            document.getElementById('displayYear').innerText = currentYear;
            document.getElementById('displayYearTachy').innerText = currentYear;
            const grid = document.getElementById('gridMars');
            const table = document.getElementById('tachyTableBody');
            grid.innerHTML = ""; table.innerHTML = "";
            let cumulT = 0; let cumulN = 0;

            // Pour l'exemple on commence le décalage du 1er Mars
            const firstDay = new Date(currentYear, 2, 1).getDay(); 
            const offset = firstDay === 0 ? 6 : firstDay - 1;

            for(let i=0; i<offset; i++) { grid.appendChild(document.createElement('div')); }

            for (let d = 1; d <= 31; d++) {
                const date = new Date(currentYear, 2, d);
                const isSunday = date.getDay() === 0;
                const isWorked = date.getDay() !== 0 && date.getDay() !== 6;
                
                const day = document.createElement('div');
                day.className = `day-box cursor-pointer ${isWorked ? 'worked' : 'rest'} ${isSunday ? 'sunday-ferie' : ''}`;
                day.innerText = d;
                day.onclick = () => openDayDetails(d, isWorked, isSunday);
                grid.appendChild(day);

                if (isWorked) {
                    cumulT += (10*60)+30; cumulN += (7*60)+20;
                    const row = document.createElement('tr');
                    row.className = "border-b border-slate-800/50";
                    row.innerHTML = `<td class="p-4 text-slate-400">${d}/03</td><td class="p-4 font-bold">10h30</td><td class="p-4 text-blue-400">07h20</td>`;
                    table.appendChild(row);
                }
            }
            document.getElementById('totalHeuresMois').innerText = Math.floor(cumulT/60) + "h" + (cumulT%60);
            document.getElementById('totalNuitMois').innerText = Math.floor(cumulN/60) + "h" + (cumulN%60);
        }

        window.onload = buildApp;
    </script>
</body>
</html>
