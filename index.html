<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Connexion USB Mon Chrono</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        button { background: #28a745; color: white; border: none; padding: 15px 25px; border-radius: 5px; font-size: 18px; cursor: pointer; }
        #log { margin-top: 20px; padding: 10px; border: 1px solid #444; text-align: left; background: #000; font-family: monospace; }
    </style>
</head>
<body>

    <h2>Diagnostic USB-C</h2>
    <p>Branchez le lecteur et appuyez sur le bouton ci-dessous.</p>
    
    <button id="btnConnect">TESTER LA CONNEXION</button>

    <div id="log">Attente d'action...</div>

    <script>
        const logDiv = document.getElementById('log');

        function printLog(msg) {
            logDiv.innerHTML += "<br>> " + msg;
            console.log(msg);
        }

        document.getElementById('btnConnect').addEventListener('click', async () => {
            printLog("Recherche d'appareil (SANS FILTRE)...");

            try {
                // TEST CRUCIAL : On enlève le filtre vendorId pour tout voir
                const device = await navigator.usb.requestDevice({ filters: [] });

                printLog("✅ APPAREIL TROUVÉ !");
                printLog("Nom : " + device.productName);
                printLog("Fabricant : " + device.manufacturerName);
                printLog("Vendor ID : " + device.vendorId);
                
                alert("Connexion réussie avec : " + device.productName);

            } catch (err) {
                printLog("❌ ERREUR : " + err.message);
                if (err.message.includes("No device selected")) {
                    printLog("L'utilisateur a annulé ou la liste était vide.");
                }
                printLog("Vérifiez que l'USB n'est pas en mode 'Charge seule'");
            }
        });
    </script>
</body>
</html>
