<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Chrono - Dylan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #ffffff; font-family: sans-serif; margin: 0; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; }
        .day-box { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; border-radius: 0.75rem; font-weight: 900; background: #1e293b; color: #475569; }
        .worked { background: linear-gradient(135deg, #ff6b35 0%, #d44d1a 100%); color: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body onload="initApp()">

    <header class="p-6 sticky top-0 bg-[#0d1117] z-50">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-orange-600 rounded-xl flex items-center justify-center shadow-lg text-2xl">🚛</div>
            <div>
                <h1 class="text-xl font-black italic uppercase leading-none">Mon <span class="text-orange-500">Chrono</span></h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase italic">Dylan Petit — Conducteur de Nuit</p>
            </div>
        </div>
    </header>

    <main class="px-6 space-y-6">
        <div id="view-dashboard" class="page-view space-y-6">
            <div id="grid" class="grid grid-cols-7 gap-2 glass-card p-5"></div>
            <div class="glass-card overflow-hidden p-4">
                <table class="w-full text-[10px] text-left">
                    <thead class="text-orange-500 font-black uppercase italic">
                        <tr><th>Date</th><th>Service</th><th>Nuit</th><th>Frais</th></tr>
                    </thead>
                    <tbody id="bodyTachy"></tbody>
                </table>
            </div>
        </div>

        <div id="view-import" class="page-view hidden">
            <button onclick="lireCarteDirectement()" class="w-full bg-emerald-600 p-8 rounded-2xl font-black italic shadow-lg active:scale-95">
                🔌 LIRE MA CARTE CONDUCTEUR
            </button>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-slate-900 border-t border-white/10 p-4 flex justify-around">
        <button onclick="navTo('dashboard')" class="text-xs font-bold uppercase">📊 Bord</button>
        <button onclick="navTo('import')" class="text-xs font-bold uppercase">📥 Import</button>
    </nav>

    <script>
        function navTo(id) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.add('hidden'));
            document.getElementById('view-' + id).classList.remove('hidden');
        }

        function initApp() {
            const grid = document.getElementById('grid');
            const data = JSON.parse(localStorage.getItem('monChrono_data_csv')) || {};
            grid.innerHTML = "";
            
            // On affiche 31 jours pour tester
            for(let d=1; d<=31; d++) {
                const dateKey = `${String(d).padStart(2, '0')}/04/2026`;
                const isWorked = data[dateKey] ? 'worked' : '';
                grid.innerHTML += `<div class="day-box ${isWorked}">${d}</div>`;
            }
        }

        function sauvegarderActivites(activites) {
            const db = JSON.parse(localStorage.getItem('monChrono_data_csv')) || {};
            activites.forEach(a => {
                if(!db[a.date]) db[a.date] = [];
                db[a.date].push(a);
            });
            localStorage.setItem('monChrono_data_csv', JSON.stringify(db));
            initApp();
            navTo('dashboard');
        }

        // TA CONSOLE DE DEBUG (AU BON ENDROIT)
        console.log = function(msg) {
            let debug = document.getElementById('debug-box');
            if(!debug) {
                debug = document.createElement('div');
                debug.id = 'debug-box';
                debug.style = "position:fixed; bottom:70px; left:5%; width:90%; height:60px; background:rgba(0,0,0,0.8); color:#00ff88; font-size:10px; padding:10px; border-radius:10px; overflow-y:auto; z-index:1000;";
                document.body.appendChild(debug);
            }
            debug.innerHTML += "> " + msg + "<br>";
        };
    </script>
    <script src="tacho.js"></script>
</body>
</html>
